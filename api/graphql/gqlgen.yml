# gqlgen codegen config for the Githome GraphQL API. Schema-first: the SDL under
# schema/ is the source of truth, object types autobind to presenter/gqlmodel,
# and the custom scalars bind to the marshalers there. Regenerate with
# `go generate ./api/graphql/...` after editing the schema.
schema:
  - schema/*.graphql

exec:
  filename: generated/generated.go
  package: generated

model:
  # Object types are hand-written in gqlmodel; gqlgen only emits the gaps here
  # (none yet in M2, but inputs and enums will land in later milestones).
  filename: generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: .
  package: graphql
  filename_template: "{name}.resolvers.go"

autobind:
  - github.com/tamnd/githome/presenter/gqlmodel

models:
  Issue:
    fields:
      # author and labels are resolved through per-request dataloaders so that
      # concurrent nested field resolutions batch into one load per field per
      # request. comments are paged through the domain on demand.
      author:
        resolver: true
      labels:
        resolver: true
      comments:
        resolver: true
  PullRequest:
    fields:
      # commits and files are read through the git layer on demand, so each needs
      # its own resolver rather than a struct field the presenter would have to
      # eagerly fill on every pull request render.
      commits:
        resolver: true
      files:
        resolver: true
      # reviewDecision and reviewThreads are fetched through the review service on
      # demand, so each carries its own resolver rather than a struct field every
      # pull request render would eagerly fill.
      reviewDecision:
        resolver: true
      reviewThreads:
        resolver: true
  Commit:
    fields:
      # statusCheckRollup folds the commit's statuses and check runs through the
      # checks service on demand, so it carries its own resolver.
      statusCheckRollup:
        resolver: true
  PullRequestReviewThread:
    fields:
      # comments takes paging arguments, so the field needs its own resolver; it
      # returns the connection the presenter already folded onto the struct.
      comments:
        resolver: true
  PullRequestReviewDecision:
    model: github.com/tamnd/githome/presenter/gqlmodel.PullRequestReviewDecision
  StatusState:
    model: github.com/tamnd/githome/presenter/gqlmodel.StatusState
  PullRequestState:
    model: github.com/tamnd/githome/presenter/gqlmodel.PullRequestState
  MergeableState:
    model: github.com/tamnd/githome/presenter/gqlmodel.MergeableState
  MergeStateStatus:
    model: github.com/tamnd/githome/presenter/gqlmodel.MergeStateStatus
  PatchStatus:
    model: github.com/tamnd/githome/presenter/gqlmodel.PatchStatus
  DateTime:
    model: github.com/tamnd/githome/presenter/gqlmodel.DateTime
  URI:
    model: github.com/tamnd/githome/presenter/gqlmodel.URI
  GitObjectID:
    model: github.com/tamnd/githome/presenter/gqlmodel.GitObjectID
  IssueState:
    model: github.com/tamnd/githome/presenter/gqlmodel.IssueState
  IssueStateReason:
    model: github.com/tamnd/githome/presenter/gqlmodel.IssueStateReason
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int32
