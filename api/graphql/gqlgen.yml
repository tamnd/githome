# gqlgen codegen config for the Githome GraphQL API. Schema-first: the SDL under
# schema/ is the source of truth, object types autobind to presenter/gqlmodel,
# and the custom scalars bind to the marshalers there. Regenerate with
# `go generate ./api/graphql/...` after editing the schema.
schema:
  - schema/*.graphql

exec:
  filename: generated/generated.go
  package: generated

model:
  # Object types are hand-written in gqlmodel; gqlgen only emits the gaps here.
  filename: generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: .
  package: graphql
  filename_template: "{name}.resolvers.go"

autobind:
  - github.com/tamnd/githome/presenter/gqlmodel

models:
  Issue:
    fields:
      author:
        resolver: true
      labels:
        resolver: true
      assignees:
        resolver: true
      milestone:
        resolver: true
      comments:
        resolver: true
      reactionGroups:
        resolver: true
  PullRequest:
    fields:
      commits:
        resolver: true
      files:
        resolver: true
      reviewDecision:
        resolver: true
      reviewThreads:
        resolver: true
      labels:
        resolver: true
      assignees:
        resolver: true
      milestone:
        resolver: true
      baseRef:
        resolver: true
      headRef:
        resolver: true
      # reviews, reviewRequests, autoMergeRequest, and comments are loaded on demand.
      reviews:
        resolver: true
      reviewRequests:
        resolver: true
      autoMergeRequest:
        resolver: true
      comments:
        resolver: true
  IssueComment:
    fields:
      # viewerDidAuthor depends on who is asking, so the presenter cannot fill it.
      viewerDidAuthor:
        resolver: true
  CommentAuthorAssociation:
    model: github.com/tamnd/githome/presenter/gqlmodel.CommentAuthorAssociation
  Repository:
    fields:
      ref:
        resolver: true
      owner:
        resolver: true
      primaryLanguage:
        resolver: true
      licenseInfo:
        resolver: true
      repositories:
        resolver: true
      # viewerPermission is computed from the viewer's relationship to the repo.
      viewerPermission:
        resolver: true
  User:
    model: github.com/tamnd/githome/presenter/gqlmodel.User
    fields:
      repositories:
        resolver: true
  RepositoryOwner:
    model: github.com/tamnd/githome/presenter/gqlmodel.RepositoryOwner
  Commit:
    fields:
      statusCheckRollup:
        resolver: true
  StatusCheckRollup:
    model: github.com/tamnd/githome/presenter/gqlmodel.StatusCheckRollup
    fields:
      contexts:
        resolver: true
  PullRequestReviewThread:
    fields:
      comments:
        resolver: true
  CheckRun:
    model: github.com/tamnd/githome/presenter/gqlmodel.CheckRun
  StatusContext:
    model: github.com/tamnd/githome/presenter/gqlmodel.StatusContext
  CheckStatusState:
    model: github.com/tamnd/githome/presenter/gqlmodel.CheckStatusState
  CheckConclusionState:
    model: github.com/tamnd/githome/presenter/gqlmodel.CheckConclusionState
  RepositoryPermission:
    model: github.com/tamnd/githome/presenter/gqlmodel.RepositoryPermission
  RepositoryConnection:
    model: github.com/tamnd/githome/presenter/gqlmodel.RepositoryConnection
  AutoMergeRequest:
    model: github.com/tamnd/githome/presenter/gqlmodel.AutoMergeRequest
  ReactionGroup:
    model: github.com/tamnd/githome/presenter/gqlmodel.ReactionGroup
  ReactingUserConnection:
    model: github.com/tamnd/githome/presenter/gqlmodel.ReactingUserConnection
  ReactionContent:
    model: github.com/tamnd/githome/presenter/gqlmodel.ReactionContent
  RateLimit:
    model: github.com/tamnd/githome/presenter/gqlmodel.RateLimit
  PullRequestReviewDecision:
    model: github.com/tamnd/githome/presenter/gqlmodel.PullRequestReviewDecision
  StatusState:
    model: github.com/tamnd/githome/presenter/gqlmodel.StatusState
  PullRequestState:
    model: github.com/tamnd/githome/presenter/gqlmodel.PullRequestState
  MergeableState:
    model: github.com/tamnd/githome/presenter/gqlmodel.MergeableState
  MergeStateStatus:
    model: github.com/tamnd/githome/presenter/gqlmodel.MergeStateStatus
  PatchStatus:
    model: github.com/tamnd/githome/presenter/gqlmodel.PatchStatus
  DateTime:
    model: github.com/tamnd/githome/presenter/gqlmodel.DateTime
  URI:
    model: github.com/tamnd/githome/presenter/gqlmodel.URI
  GitObjectID:
    model: github.com/tamnd/githome/presenter/gqlmodel.GitObjectID
  IssueState:
    model: github.com/tamnd/githome/presenter/gqlmodel.IssueState
  IssueStateReason:
    model: github.com/tamnd/githome/presenter/gqlmodel.IssueStateReason
  Milestone:
    model: github.com/tamnd/githome/presenter/gqlmodel.Milestone
  Language:
    model: github.com/tamnd/githome/presenter/gqlmodel.Language
  License:
    model: github.com/tamnd/githome/presenter/gqlmodel.License
  UserConnection:
    model: github.com/tamnd/githome/presenter/gqlmodel.UserConnection
  PullRequestMergeMethod:
    model: github.com/tamnd/githome/presenter/gqlmodel.PullRequestMergeMethod
  PullRequestReviewEvent:
    model: github.com/tamnd/githome/presenter/gqlmodel.PullRequestReviewEvent
  DiffSide:
    model: github.com/tamnd/githome/presenter/gqlmodel.DiffSide
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int32
