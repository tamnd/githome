# The issue slice of the GraphQL schema. It adds the issue read fields gh issue
# view and gh issue list select onto Repository, and the create, comment, close,
# and reopen mutations gh issue create, comment, and close send. Object types
# bind to the hand-written structs in presenter/gqlmodel; the enums bind to the
# typed string constants there. The schema grows toward GitHub's full Issue type
# milestone by milestone.

extend type Repository {
  # issue looks up one issue by its per-repository number. It is null when no
  # such issue exists.
  issue(number: Int!): Issue
  # labels is the connection over the repository's labels. gh label list pages
  # it with a name filter and NAME or CREATED_AT ordering.
  labels(
    first: Int
    after: String
    last: Int
    before: String
    orderBy: LabelOrder
    query: String
  ): LabelConnection
  # issues is the Relay connection over the repository's issues, newest first.
  issues(
    first: Int
    after: String
    last: Int
    before: String
    states: [IssueState!]
    filterBy: IssueFilters
    orderBy: IssueOrder
    labels: [String!]
  ): IssueConnection!
}

# IssueFilters narrows an issue listing, the way gh issue list filters by
# assignee, author, label, and milestone.
input IssueFilters {
  assignee: String
  createdBy: String
  labels: [String!]
  mentioned: String
  milestone: String
  milestoneNumber: String
  since: DateTime
  states: [IssueState!]
  viewerSubscribed: Boolean
}

# IssueOrderField is the field to order issues (and pull requests) by.
enum IssueOrderField {
  CREATED_AT
  UPDATED_AT
  COMMENTS
}

# IssueOrder specifies how to order issues and pull requests.
input IssueOrder {
  field: IssueOrderField!
  direction: OrderDirection!
}

# Actor is an entity that can author issues, comments, and reviews. It is an
# interface so gh's `... on User` inline fragments validate; User is the only
# implementer until organizations and bots arrive.
interface Actor {
  login: String!
  url: URI!
  avatarUrl: URI!
  resourcePath: URI!
}

# Issue is a repository issue.
type Issue implements Node {
  id: ID!
  number: Int!
  title: String!
  body: String!
  state: IssueState!
  stateReason: IssueStateReason
  url: URI!
  locked: Boolean!
  closed: Boolean!
  author: Actor
  createdAt: DateTime!
  updatedAt: DateTime!
  closedAt: DateTime
  labels(first: Int, after: String): LabelConnection
  assignees(first: Int, after: String): UserConnection!
  milestone: Milestone
  comments(first: Int, after: String, last: Int, before: String): IssueCommentConnection!
  # reactionGroups summarises the emoji reactions on this issue, grouped by
  # content. An empty slice means no reactions have been posted.
  reactionGroups: [ReactionGroup!]!
}

# ReactionContent is an emoji reaction type.
enum ReactionContent {
  THUMBS_UP
  THUMBS_DOWN
  LAUGH
  HOORAY
  CONFUSED
  HEART
  ROCKET
  EYES
}

# ReactionGroup summarises how many users reacted with a given emoji.
type ReactionGroup {
  content: ReactionContent!
  users: ReactingUserConnection!
}

# ReactingUserConnection is the slim connection gh reads for reaction counts.
type ReactingUserConnection {
  totalCount: Int!
}

# Milestone is a repository milestone. gh issue view and pr view select
# number, title, description, and dueOn.
type Milestone {
  id: ID!
  number: Int!
  title: String!
  description: String
  dueOn: DateTime
  state: String!
  url: URI!
}

# UserConnection is the Relay connection over users (assignees, etc.).
type UserConnection {
  nodes: [User]
  totalCount: Int!
}

# IssueState is whether an issue is open or closed.
enum IssueState {
  OPEN
  CLOSED
}

# IssueStateReason is why an issue is in its current state.
enum IssueStateReason {
  COMPLETED
  NOT_PLANNED
  REOPENED
}

# IssueConnection is the connection over a repository's issues.
type IssueConnection {
  edges: [IssueEdge]
  nodes: [Issue]
  pageInfo: PageInfo!
  totalCount: Int!
}

type IssueEdge {
  cursor: String!
  node: Issue
}

# PageInfo is the Relay pagination metadata shared by every connection.
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Label is a repository label.
type Label implements Node {
  id: ID!
  name: String!
  color: String!
  description: String
  createdAt: DateTime!
}

type LabelConnection {
  nodes: [Label]
  pageInfo: PageInfo!
  totalCount: Int!
}

# LabelOrderField is the field to order labels by.
enum LabelOrderField {
  NAME
  CREATED_AT
}

# LabelOrder specifies how to order labels.
input LabelOrder {
  field: LabelOrderField!
  direction: OrderDirection!
}

# CommentAuthorAssociation is the author's association with the repository the
# comment was posted on.
enum CommentAuthorAssociation {
  MEMBER
  OWNER
  MANNEQUIN
  COLLABORATOR
  CONTRIBUTOR
  FIRST_TIME_CONTRIBUTOR
  FIRST_TIMER
  NONE
}

# IssueComment is a comment on an issue or pull request. The fields are the
# ones gh's issueComments fragment selects.
type IssueComment {
  id: ID!
  body: String!
  url: URI!
  author: Actor
  authorAssociation: CommentAuthorAssociation!
  # includesCreatedEdit is whether the comment body has been edited since it
  # was created.
  includesCreatedEdit: Boolean!
  # isMinimized is whether the comment is hidden. Githome does not minimize
  # comments, so this is always false and minimizedReason is always null.
  isMinimized: Boolean!
  minimizedReason: String
  # viewerDidAuthor is whether the request's viewer wrote this comment.
  viewerDidAuthor: Boolean!
  reactionGroups: [ReactionGroup!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type IssueCommentConnection {
  nodes: [IssueComment]
  pageInfo: PageInfo!
  totalCount: Int!
}

type IssueCommentEdge {
  cursor: String!
  node: IssueComment
}

# Mutation is the GraphQL write root. gh issue create, comment, and close send
# these mutations; each takes a node id in its input and returns the affected
# object so the client can read back its url and state.
type Mutation {
  createIssue(input: CreateIssueInput!): CreateIssuePayload
  updateIssue(input: UpdateIssueInput!): UpdateIssuePayload
  addComment(input: AddCommentInput!): AddCommentPayload
  closeIssue(input: CloseIssueInput!): CloseIssuePayload
  reopenIssue(input: ReopenIssueInput!): ReopenIssuePayload
}

input CreateIssueInput {
  repositoryId: ID!
  title: String!
  body: String
  clientMutationId: String
}

type CreateIssuePayload {
  issue: Issue
  clientMutationId: String
}

input AddCommentInput {
  subjectId: ID!
  body: String!
  clientMutationId: String
}

type AddCommentPayload {
  commentEdge: IssueCommentEdge
  clientMutationId: String
}

# IssueClosedStateReason is the reason supplied when closing an issue.
enum IssueClosedStateReason {
  COMPLETED
  NOT_PLANNED
}

input CloseIssueInput {
  issueId: ID!
  stateReason: IssueClosedStateReason
  clientMutationId: String
}

type CloseIssuePayload {
  issue: Issue
  clientMutationId: String
}

input ReopenIssueInput {
  issueId: ID!
  clientMutationId: String
}

type ReopenIssuePayload {
  issue: Issue
  clientMutationId: String
}

input UpdateIssueInput {
  id: ID!
  title: String
  body: String
  state: IssueState
  assigneeIds: [ID!]
  labelIds: [ID!]
  milestoneId: ID
  clientMutationId: String
}

type UpdateIssuePayload {
  issue: Issue
  clientMutationId: String
}
