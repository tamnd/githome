# The issue slice of the GraphQL schema. It adds the issue read fields gh issue
# view and gh issue list select onto Repository, and the create, comment, close,
# and reopen mutations gh issue create, comment, and close send. Object types
# bind to the hand-written structs in presenter/gqlmodel; the enums bind to the
# typed string constants there. The schema grows toward GitHub's full Issue type
# milestone by milestone.

extend type Repository {
  # issue looks up one issue by its per-repository number. It is null when no
  # such issue exists.
  issue(number: Int!): Issue
  # labels is the connection over the repository's labels. gh label list pages
  # it with a name filter and NAME or CREATED_AT ordering.
  labels(
    first: Int
    after: String
    last: Int
    before: String
    orderBy: LabelOrder
    query: String
  ): LabelConnection
  # issues is the Relay connection over the repository's issues, newest first.
  issues(
    first: Int
    after: String
    last: Int
    before: String
    states: [IssueState!]
    filterBy: IssueFilters
    orderBy: IssueOrder
    labels: [String!]
  ): IssueConnection!
}

# IssueFilters narrows an issue listing, the way gh issue list filters by
# assignee, author, label, and milestone.
input IssueFilters {
  assignee: String
  createdBy: String
  labels: [String!]
  mentioned: String
  milestone: String
  milestoneNumber: String
  since: DateTime
  states: [IssueState!]
  viewerSubscribed: Boolean
}

# IssueOrderField is the field to order issues (and pull requests) by.
enum IssueOrderField {
  CREATED_AT
  UPDATED_AT
  COMMENTS
}

# IssueOrder specifies how to order issues and pull requests.
input IssueOrder {
  field: IssueOrderField!
  direction: OrderDirection!
}

# Actor is an entity that can author issues, comments, and reviews. It is an
# interface so gh's `... on User` inline fragments validate; User is the only
# implementer until organizations and bots arrive.
interface Actor {
  login: String!
  url: URI!
  avatarUrl: URI!
  resourcePath: URI!
}

# Issue is a repository issue.
type Issue implements Node {
  id: ID!
  number: Int!
  title: String!
  body: String!
  state: IssueState!
  stateReason: IssueStateReason
  url: URI!
  locked: Boolean!
  closed: Boolean!
  author: Actor
  createdAt: DateTime!
  updatedAt: DateTime!
  closedAt: DateTime
  labels(first: Int, after: String): LabelConnection
  assignees(first: Int, after: String): UserConnection!
  milestone: Milestone
  comments(first: Int, after: String, last: Int, before: String): IssueCommentConnection!
  # reactionGroups summarises the emoji reactions on this issue, grouped by
  # content. An empty slice means no reactions have been posted.
  reactionGroups: [ReactionGroup!]!
  # projectCards is the connection over classic project cards. Githome does not
  # implement classic projects, so it is always empty; the field exists because
  # gh issue view selects it unconditionally.
  projectCards(first: Int, after: String): ProjectCardConnection!
}

# ProjectCard is a card on a classic project board. Githome does not implement
# classic projects; the card types exist so gh's default field sets validate.
type ProjectCard {
  project: Project!
  column: ProjectColumn
}

# Project is a classic project board.
type Project {
  name: String!
}

# ProjectColumn is one column on a classic project board.
type ProjectColumn {
  name: String!
}

type ProjectCardConnection {
  nodes: [ProjectCard]
  pageInfo: PageInfo!
  totalCount: Int!
}

# ReactionContent is an emoji reaction type.
enum ReactionContent {
  THUMBS_UP
  THUMBS_DOWN
  LAUGH
  HOORAY
  CONFUSED
  HEART
  ROCKET
  EYES
}

# ReactionGroup summarises how many users reacted with a given emoji.
type ReactionGroup {
  content: ReactionContent!
  users: ReactingUserConnection!
}

# ReactingUserConnection is the slim connection gh reads for reaction counts.
type ReactingUserConnection {
  totalCount: Int!
}

# Milestone is a repository milestone. gh issue view and pr view select
# number, title, description, and dueOn.
type Milestone implements Node {
  id: ID!
  number: Int!
  title: String!
  description: String
  dueOn: DateTime
  state: String!
  url: URI!
}

# UserConnection is the Relay connection over users (assignees, etc.).
type UserConnection {
  nodes: [User]
  totalCount: Int!
}

# IssueState is whether an issue is open or closed.
enum IssueState {
  OPEN
  CLOSED
}

# IssueStateReason is why an issue is in its current state.
enum IssueStateReason {
  COMPLETED
  NOT_PLANNED
  REOPENED
}

# IssueConnection is the connection over a repository's issues.
type IssueConnection {
  edges: [IssueEdge]
  nodes: [Issue]
  pageInfo: PageInfo!
  totalCount: Int!
}

type IssueEdge {
  cursor: String!
  node: Issue
}

# PageInfo is the Relay pagination metadata shared by every connection.
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# Label is a repository label.
type Label implements Node {
  id: ID!
  name: String!
  color: String!
  description: String
  # isDefault is whether the label is one of the labels GitHub seeds a new
  # repository with (bug, enhancement, and so on).
  isDefault: Boolean!
  # url is the label's HTML URL, the filtered issue list for the label.
  url: URI!
  createdAt: DateTime!
  # updatedAt is the last time the label was renamed or recolored. Githome does
  # not track a separate label update instant, so it mirrors createdAt.
  updatedAt: DateTime!
}

type LabelConnection {
  edges: [LabelEdge]
  nodes: [Label]
  pageInfo: PageInfo!
  totalCount: Int!
}

type LabelEdge {
  cursor: String!
  node: Label
}

# LabelOrderField is the field to order labels by.
enum LabelOrderField {
  NAME
  CREATED_AT
}

# LabelOrder specifies how to order labels.
input LabelOrder {
  field: LabelOrderField!
  direction: OrderDirection!
}

# CommentAuthorAssociation is the author's association with the repository the
# comment was posted on.
enum CommentAuthorAssociation {
  MEMBER
  OWNER
  MANNEQUIN
  COLLABORATOR
  CONTRIBUTOR
  FIRST_TIME_CONTRIBUTOR
  FIRST_TIMER
  NONE
}

# IssueComment is a comment on an issue or pull request. The fields are the
# ones gh's issueComments fragment selects.
type IssueComment implements Node {
  id: ID!
  body: String!
  url: URI!
  author: Actor
  authorAssociation: CommentAuthorAssociation!
  # includesCreatedEdit is whether the comment body has been edited since it
  # was created.
  includesCreatedEdit: Boolean!
  # isMinimized is whether the comment is hidden. Githome does not minimize
  # comments, so this is always false and minimizedReason is always null.
  isMinimized: Boolean!
  minimizedReason: String
  # viewerDidAuthor is whether the request's viewer wrote this comment.
  viewerDidAuthor: Boolean!
  reactionGroups: [ReactionGroup!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type IssueCommentConnection {
  nodes: [IssueComment]
  pageInfo: PageInfo!
  totalCount: Int!
}

type IssueCommentEdge {
  cursor: String!
  node: IssueComment
}

# Mutation is the GraphQL write root. gh issue create, comment, and close send
# these mutations; each takes a node id in its input and returns the affected
# object so the client can read back its url and state.
type Mutation {
  createIssue(input: CreateIssueInput!): CreateIssuePayload
  updateIssue(input: UpdateIssueInput!): UpdateIssuePayload
  addComment(input: AddCommentInput!): AddCommentPayload
  closeIssue(input: CloseIssueInput!): CloseIssuePayload
  reopenIssue(input: ReopenIssueInput!): ReopenIssuePayload
  # updateIssueComment edits an issue or pull request comment's body, the
  # mutation gh issue comment --edit-last and gh pr comment --edit-last send.
  updateIssueComment(input: UpdateIssueCommentInput!): UpdateIssueCommentPayload
  # lockLockable locks a lockable subject's conversation, optionally recording a
  # reason; gh issue lock and gh pr lock send it.
  lockLockable(input: LockLockableInput!): LockLockablePayload
  # unlockLockable reopens a locked conversation; gh issue unlock sends it.
  unlockLockable(input: UnlockLockableInput!): UnlockLockablePayload
  # addReaction adds an emoji reaction to a reactable subject (issue, pull
  # request, comment, or review); gh's reaction path and the web client send it.
  addReaction(input: AddReactionInput!): AddReactionPayload
  # removeReaction removes the viewer's emoji reaction from a subject.
  removeReaction(input: RemoveReactionInput!): RemoveReactionPayload
  # deleteIssue permanently deletes an issue. Githome does not support deleting
  # issues, so it returns an UNPROCESSABLE error rather than a fake success.
  deleteIssue(input: DeleteIssueInput!): DeleteIssuePayload
  # transferIssue moves an issue to another repository. Githome does not support
  # transferring issues, so it returns an UNPROCESSABLE error.
  transferIssue(input: TransferIssueInput!): TransferIssuePayload
  # pinIssue pins an issue to its repository. Githome does not support pinned
  # issues, so it returns an UNPROCESSABLE error.
  pinIssue(input: PinIssueInput!): PinIssuePayload
  # unpinIssue unpins a pinned issue. Githome does not support pinned issues, so
  # it returns an UNPROCESSABLE error.
  unpinIssue(input: UnpinIssueInput!): UnpinIssuePayload
}

input UpdateIssueCommentInput {
  id: ID!
  body: String!
  clientMutationId: String
}

type UpdateIssueCommentPayload {
  issueComment: IssueComment
  clientMutationId: String
}

# LockReason is why a conversation was locked, the values gh issue lock --reason
# accepts.
enum LockReason {
  OFF_TOPIC
  TOO_HEATED
  RESOLVED
  SPAM
}

input LockLockableInput {
  lockableId: ID!
  lockReason: LockReason
  clientMutationId: String
}

type LockLockablePayload {
  # lockedRecord is the issue or pull request whose conversation was locked.
  lockedRecord: Node
  # actor is the viewer who locked the conversation.
  actor: Actor
  clientMutationId: String
}

input UnlockLockableInput {
  lockableId: ID!
  clientMutationId: String
}

type UnlockLockablePayload {
  # unlockedRecord is the issue or pull request whose conversation was unlocked.
  unlockedRecord: Node
  actor: Actor
  clientMutationId: String
}

# Reaction is a single emoji reaction a user left on a reactable subject.
type Reaction implements Node {
  id: ID!
  content: ReactionContent!
  user: User
  createdAt: DateTime!
}

input AddReactionInput {
  subjectId: ID!
  content: ReactionContent!
  clientMutationId: String
}

type AddReactionPayload {
  reaction: Reaction
  # subject is the issue, pull request, comment, or review the reaction was
  # added to.
  subject: Node
  # reactionGroups is the subject's reaction summary after the change.
  reactionGroups: [ReactionGroup!]
  clientMutationId: String
}

input RemoveReactionInput {
  subjectId: ID!
  content: ReactionContent!
  clientMutationId: String
}

type RemoveReactionPayload {
  reaction: Reaction
  subject: Node
  reactionGroups: [ReactionGroup!]
  clientMutationId: String
}

input DeleteIssueInput {
  issueId: ID!
  clientMutationId: String
}

type DeleteIssuePayload {
  repository: Repository
  clientMutationId: String
}

input TransferIssueInput {
  issueId: ID!
  repositoryId: ID!
  createLabelsIfMissing: Boolean
  clientMutationId: String
}

type TransferIssuePayload {
  issue: Issue
  clientMutationId: String
}

input PinIssueInput {
  issueId: ID!
  clientMutationId: String
}

type PinIssuePayload {
  issue: Issue
  clientMutationId: String
}

input UnpinIssueInput {
  issueId: ID!
  clientMutationId: String
}

type UnpinIssuePayload {
  issue: Issue
  clientMutationId: String
}

input CreateIssueInput {
  repositoryId: ID!
  title: String!
  body: String
  # assigneeIds, labelIds, and milestoneId attach metadata at creation; gh
  # issue create --assignee/--label/--milestone sends them in this input.
  assigneeIds: [ID!]
  labelIds: [ID!]
  milestoneId: ID
  # projectIds and issueTemplate are part of GitHub's CreateIssueInput. Githome
  # does not model classic projects, and the template is a client-side hint, so
  # both are accepted for document compatibility and otherwise ignored.
  projectIds: [ID!]
  issueTemplate: String
  clientMutationId: String
}

type CreateIssuePayload {
  issue: Issue
  clientMutationId: String
}

input AddCommentInput {
  subjectId: ID!
  body: String!
  clientMutationId: String
}

type AddCommentPayload {
  # subject is the issue or pull request the comment was added to.
  subject: Node
  commentEdge: IssueCommentEdge
  # timelineEdge is the new comment as a timeline item, the shape GitHub's web
  # client reads back. Githome's timeline is the comment itself.
  timelineEdge: IssueTimelineItemsEdge
  clientMutationId: String
}

# IssueTimelineItemsEdge is one edge of an issue's timeline. Githome models the
# timeline as the comment stream, so the node is the added IssueComment.
type IssueTimelineItemsEdge {
  cursor: String!
  node: IssueComment
}

# IssueClosedStateReason is the reason supplied when closing an issue.
enum IssueClosedStateReason {
  COMPLETED
  NOT_PLANNED
}

input CloseIssueInput {
  issueId: ID!
  stateReason: IssueClosedStateReason
  clientMutationId: String
}

type CloseIssuePayload {
  issue: Issue
  clientMutationId: String
}

input ReopenIssueInput {
  issueId: ID!
  clientMutationId: String
}

type ReopenIssuePayload {
  issue: Issue
  clientMutationId: String
}

input UpdateIssueInput {
  id: ID!
  title: String
  body: String
  state: IssueState
  assigneeIds: [ID!]
  labelIds: [ID!]
  milestoneId: ID
  clientMutationId: String
}

type UpdateIssuePayload {
  issue: Issue
  clientMutationId: String
}
