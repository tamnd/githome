# The pull request slice of the GraphQL schema. It adds the pull request read
# fields gh pr view and gh pr diff select onto Repository. Object types bind to
# the hand-written structs in presenter/gqlmodel; the enums bind to the typed
# string constants there. The merge view (mergeable, mergeStateStatus) is the
# worker-resolved state, UNKNOWN until the recompute runs. The schema grows
# toward GitHub's full PullRequest type milestone by milestone.

extend type Repository {
  # pullRequest looks up one pull request by its per-repository number. It is
  # null when no such pull request exists.
  pullRequest(number: Int!): PullRequest
  # pullRequests is the Relay connection over the repository's pull requests,
  # newest first. headRefName is how gh pr view <branch> finds the pull request
  # for a branch; labels and baseRefName narrow listings the same way.
  pullRequests(
    first: Int
    after: String
    last: Int
    before: String
    states: [PullRequestState!]
    headRefName: String
    baseRefName: String
    labels: [String!]
    orderBy: IssueOrder
  ): PullRequestConnection!
}

# PullRequest is a repository pull request.
type PullRequest implements Node {
  id: ID!
  number: Int!
  title: String!
  body: String!
  state: PullRequestState!
  url: URI!
  locked: Boolean!
  closed: Boolean!
  isDraft: Boolean!
  merged: Boolean!
  mergedAt: DateTime
  mergeable: MergeableState!
  mergeStateStatus: MergeStateStatus!
  author: Actor
  # authorAssociation is the author's association with the repository.
  authorAssociation: CommentAuthorAssociation!
  baseRefName: String!
  headRefName: String!
  baseRefOid: GitObjectID!
  headRefOid: GitObjectID!
  baseRef: Ref
  headRef: Ref
  # isCrossRepository is whether the head ref lives in a different repository
  # than the base, the fork case.
  isCrossRepository: Boolean!
  # maintainerCanModify is whether maintainers of the base repository can push
  # to the head branch.
  maintainerCanModify: Boolean!
  # headRepository is the repository the head ref lives in. It is null when the
  # source fork has been deleted.
  headRepository: Repository
  # headRepositoryOwner is the owner of the head repository.
  headRepositoryOwner: RepositoryOwner
  # fullDatabaseId is the pull request's integer database id, the BigInt twin
  # of the REST id.
  fullDatabaseId: BigInt
  # mergedBy is the actor who merged the pull request, null while unmerged.
  mergedBy: Actor
  # mergeCommit is the commit created when the pull request merged, null while
  # it is unmerged.
  mergeCommit: Commit
  # potentialMergeCommit is the test-merge commit GitHub computes for an open,
  # mergeable pull request. Githome does not compute one, so it is null.
  potentialMergeCommit: Commit
  # closingIssuesReferences is the connection over issues this pull request will
  # close when merged, parsed from closing keywords (closes/fixes/resolves #N)
  # in the body.
  closingIssuesReferences(first: Int, after: String, last: Int, before: String, orderBy: IssueOrder): IssueConnection
  additions: Int!
  deletions: Int!
  changedFiles: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  closedAt: DateTime
  labels(first: Int, after: String): LabelConnection
  assignees(first: Int, after: String): UserConnection!
  milestone: Milestone
  # autoMergeRequest is the auto-merge configuration when enabled, null otherwise.
  autoMergeRequest: AutoMergeRequest
  # isInMergeQueue is whether the pull request is queued to merge. Githome does
  # not implement a merge queue, so this is always false.
  isInMergeQueue: Boolean!
  # commits is the connection over the pull request's own commits, oldest first.
  commits(first: Int, after: String, last: Int, before: String): PullRequestCommitConnection!
  # files is the connection over the pull request's changed files.
  files(first: Int, after: String): PullRequestChangedFileConnection!
  # reviews is the connection over submitted reviews on the pull request.
  reviews(first: Int, after: String): PullRequestReviewConnection!
  # latestReviews keeps the most recent submitted review per reviewer, the set
  # gh pr view folds into its review summary.
  latestReviews(first: Int, after: String): PullRequestReviewConnection
  # reviewRequests is the connection over requested reviewers.
  reviewRequests(first: Int, after: String): ReviewRequestConnection!
  # comments is the connection over issue-level (non-inline) comments.
  comments(first: Int, after: String, last: Int, before: String): IssueCommentConnection!
  # reactionGroups summarises the emoji reactions on the pull request, grouped
  # by content. An empty slice means no reactions have been posted.
  reactionGroups: [ReactionGroup!]!
  # projectCards is the connection over classic project cards. Githome does not
  # implement classic projects, so it is always empty; the field exists because
  # gh pr view selects it unconditionally.
  projectCards(first: Int, after: String): ProjectCardConnection!
}

# AutoMergeRequest is the auto-merge configuration attached to a pull request.
# gh pr view selects the commit shape and who enabled it.
type AutoMergeRequest {
  authorEmail: String
  commitBody: String
  commitHeadline: String
  enabledAt: DateTime
  enabledBy: Actor
  mergeMethod: PullRequestMergeMethod!
}

# PullRequestState is whether a pull request is open, closed, or merged.
enum PullRequestState {
  OPEN
  CLOSED
  MERGED
}

# MergeableState is the tri-state mergeability the worker resolves.
enum MergeableState {
  MERGEABLE
  CONFLICTING
  UNKNOWN
}

# MergeStateStatus is GitHub's richer view of a pull request's merge state.
enum MergeStateStatus {
  BEHIND
  BLOCKED
  CLEAN
  DIRTY
  DRAFT
  HAS_HOOKS
  UNKNOWN
  UNSTABLE
}

# PatchStatus is how a file changed across a pull request's diff.
enum PatchStatus {
  ADDED
  DELETED
  MODIFIED
  RENAMED
  COPIED
  CHANGED
}

# PullRequestConnection is the connection over a repository's pull requests.
type PullRequestConnection {
  edges: [PullRequestEdge]
  nodes: [PullRequest]
  pageInfo: PageInfo!
  totalCount: Int!
}

type PullRequestEdge {
  cursor: String!
  node: PullRequest
}

# PullRequestChangedFile is one file's change in a pull request's diff.
type PullRequestChangedFile {
  path: String!
  additions: Int!
  deletions: Int!
  changeType: PatchStatus!
}

type PullRequestChangedFileConnection {
  nodes: [PullRequestChangedFile]
  pageInfo: PageInfo!
  totalCount: Int!
}

# PullRequestCommit wraps one commit on a pull request.
type PullRequestCommit {
  url: URI!
  commit: Commit!
}

# Commit is the reduced git commit gh pr view reads. It implements GitObject,
# so a Ref.target can narrow to it with an inline fragment.
type Commit implements GitObject & Node {
  id: ID!
  oid: GitObjectID!
  abbreviatedOid: String!
  message: String!
  messageHeadline: String!
}

type PullRequestCommitConnection {
  nodes: [PullRequestCommit]
  pageInfo: PageInfo!
  totalCount: Int!
}

# ReviewRequestConnection is the connection over a pull request's requested reviewers.
type ReviewRequestConnection {
  nodes: [ReviewRequest]
  pageInfo: PageInfo!
  totalCount: Int!
}

# RequestedReviewer is who a review request names: a user or a team.
union RequestedReviewer = User | Team

# ReviewRequest is one requested reviewer on a pull request.
type ReviewRequest {
  requestedReviewer: RequestedReviewer
}

# Team is a group of users in an organization. Githome does not model teams
# yet; the type exists so gh's `... on Team` inline fragments validate.
type Team {
  id: ID!
  name: String!
  slug: String!
  organization: Organization!
}

# Organization is an account that owns repositories and teams. Githome does not
# model organizations yet; the type exists so team fragments and gh's
# `... on Organization` inline fragments on repositoryOwner/node resolve.
type Organization implements Node & Actor & RepositoryOwner {
  id: ID!
  login: String!
  name: String
  description: String
  email: String
  location: String
  websiteUrl: URI
  twitterUsername: String
  # databaseId is the organization's integer database id.
  databaseId: Int
  url: URI!
  avatarUrl(size: Int): URI!
  resourcePath: URI!
  createdAt: DateTime!
  updatedAt: DateTime!
  # repositories lists the repositories owned by this organization.
  repositories(
    first: Int
    after: String
    ownerAffiliations: [RepositoryAffiliation!]
    isArchived: Boolean
    isFork: Boolean
    privacy: RepositoryPrivacy
    orderBy: RepositoryOrder
  ): RepositoryConnection!
}

# PullRequestMergeMethod is the strategy to use when merging a pull request.
enum PullRequestMergeMethod {
  MERGE
  SQUASH
  REBASE
}

extend type Mutation {
  # createPullRequest opens a new pull request.
  createPullRequest(input: CreatePullRequestInput!): CreatePullRequestPayload
  # mergePullRequest merges a pull request.
  mergePullRequest(input: MergePullRequestInput!): MergePullRequestPayload
  # enablePullRequestAutoMerge enables auto-merge on a pull request.
  enablePullRequestAutoMerge(input: EnablePullRequestAutoMergeInput!): EnablePullRequestAutoMergePayload
  # updatePullRequest edits a pull request's metadata.
  updatePullRequest(input: UpdatePullRequestInput!): UpdatePullRequestPayload
  # closePullRequest closes a pull request without merging. gh pr close sends
  # this with no REST fallback.
  closePullRequest(input: ClosePullRequestInput!): ClosePullRequestPayload
  # reopenPullRequest reopens a closed, unmerged pull request. gh pr reopen
  # sends this with no REST fallback.
  reopenPullRequest(input: ReopenPullRequestInput!): ReopenPullRequestPayload
  # requestReviews adds or removes review requests on a pull request.
  requestReviews(input: RequestReviewsInput!): RequestReviewsPayload
  # convertPullRequestToDraft converts a pull request to a draft.
  convertPullRequestToDraft(input: ConvertPullRequestToDraftInput!): ConvertPullRequestToDraftPayload
  # markPullRequestReadyForReview marks a pull request ready for review.
  markPullRequestReadyForReview(input: MarkPullRequestReadyForReviewInput!): MarkPullRequestReadyForReviewPayload
  # disablePullRequestAutoMerge disables auto-merge on a pull request.
  disablePullRequestAutoMerge(input: DisablePullRequestAutoMergeInput!): DisablePullRequestAutoMergePayload
}

input CreatePullRequestInput {
  repositoryId: ID!
  baseRefName: String!
  headRefName: String!
  title: String!
  body: String
  draft: Boolean
  maintainerCanModify: Boolean
  clientMutationId: String
}

type CreatePullRequestPayload {
  pullRequest: PullRequest
  clientMutationId: String
}

input MergePullRequestInput {
  pullRequestId: ID!
  # mergeMethod defaults to MERGE, matching GitHub's SDL default so a document
  # that omits it merges with a merge commit rather than failing validation.
  mergeMethod: PullRequestMergeMethod = MERGE
  commitHeadline: String
  commitBody: String
  expectedHeadOid: GitObjectID
  authorEmail: String
  clientMutationId: String
}

type MergePullRequestPayload {
  pullRequest: PullRequest
  actor: Actor
  clientMutationId: String
}

input EnablePullRequestAutoMergeInput {
  pullRequestId: ID!
  mergeMethod: PullRequestMergeMethod
  commitHeadline: String
  commitBody: String
  authorEmail: String
  clientMutationId: String
}

type EnablePullRequestAutoMergePayload {
  pullRequest: PullRequest
  actor: Actor
  clientMutationId: String
}

input UpdatePullRequestInput {
  pullRequestId: ID!
  title: String
  body: String
  baseRefName: String
  maintainerCanModify: Boolean
  assigneeIds: [ID!]
  labelIds: [ID!]
  milestoneId: ID
  clientMutationId: String
}

type UpdatePullRequestPayload {
  pullRequest: PullRequest
  clientMutationId: String
}

input ClosePullRequestInput {
  pullRequestId: ID!
  clientMutationId: String
}

type ClosePullRequestPayload {
  pullRequest: PullRequest
  clientMutationId: String
}

input ReopenPullRequestInput {
  pullRequestId: ID!
  clientMutationId: String
}

type ReopenPullRequestPayload {
  pullRequest: PullRequest
  clientMutationId: String
}

input RequestReviewsInput {
  pullRequestId: ID!
  userIds: [ID!]
  teamIds: [ID!]
  union: Boolean
  clientMutationId: String
}

type RequestReviewsPayload {
  pullRequest: PullRequest
  # requestedReviewersEdge is the first newly requested reviewer as a connection
  # edge, the shape GitHub returns so a client can append it to a cached list.
  requestedReviewersEdge: UserEdge
  clientMutationId: String
}

# UserEdge is one edge of a user connection, pairing a user with its cursor.
type UserEdge {
  cursor: String!
  node: User
}

input ConvertPullRequestToDraftInput {
  pullRequestId: ID!
  clientMutationId: String
}

type ConvertPullRequestToDraftPayload {
  pullRequest: PullRequest
  clientMutationId: String
}

input MarkPullRequestReadyForReviewInput {
  pullRequestId: ID!
  clientMutationId: String
}

type MarkPullRequestReadyForReviewPayload {
  pullRequest: PullRequest
  clientMutationId: String
}

input DisablePullRequestAutoMergeInput {
  pullRequestId: ID!
  clientMutationId: String
}

type DisablePullRequestAutoMergePayload {
  pullRequest: PullRequest
  clientMutationId: String
}
