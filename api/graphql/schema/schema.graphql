# The Githome GraphQL schema. It grows milestone by milestone toward GitHub's
# GraphQL v4 contract. Object types bind to hand-written structs in
# presenter/gqlmodel; the scalars bind to the marshalers there.

scalar DateTime
scalar URI
scalar GitObjectID
# BigInt carries an integer too wide for Int as a string, the way GitHub types
# fullDatabaseId.
scalar BigInt
# HTML is a string of rendered HTML, the type of bodyHTML fields.
scalar HTML
# GitTimestamp is an ISO 8601 instant that keeps the offset a git object
# recorded instead of converting to UTC.
scalar GitTimestamp
# Date is an ISO 8601 calendar date with no time part.
scalar Date
# GitSSHRemote is a git SSH clone address, the type of Repository.sshUrl.
scalar GitSSHRemote
# Base64String is a base64-encoded string, the type blob text rides in.
scalar Base64String

# Node is the interface every object with a node ID implements. Clients use
# node(id:) and nodes(ids:) to look up objects by their opaque IDs.
interface Node {
  id: ID!
}

type Query {
  # repository looks up a single repository by its owner login and name. It is
  # null when the repository does not exist or the viewer cannot see it.
  # followRenames asks the lookup to follow a repository that was renamed away
  # from owner/name to its new path; Githome resolves the current name directly,
  # so the argument is accepted for wire compatibility and has no effect.
  repository(owner: String!, name: String!, followRenames: Boolean = true): Repository
  # viewer is the currently authenticated user.
  viewer: User!
  # user looks up a user by login.
  user(login: String!): User
  # repositoryOwner looks up a user or organization by login. Returns null when
  # no matching owner exists.
  repositoryOwner(login: String!): RepositoryOwner
  # node looks up any object by its opaque node ID. Returns null when the ID
  # cannot be resolved or the viewer cannot see the object.
  node(id: ID!): Node
  # nodes looks up a list of objects by their opaque node IDs. Each element is
  # null when the ID cannot be resolved or the viewer cannot see the object.
  nodes(ids: [ID!]!): [Node]!
  # rateLimit returns the current rate-limit state for the authenticated user.
  # dryRun asks GitHub to compute the cost of the rest of the query without
  # charging it; Githome reports the same live state either way.
  rateLimit(dryRun: Boolean = false): RateLimit
  # search returns results matching a query string across repositories, issues,
  # pull requests, and users. first/after page forward; last/before page
  # backward. first must not exceed 100.
  search(query: String!, type: SearchType!, first: Int, after: String, last: Int, before: String): SearchResultItemConnection!
  # license looks up a single open-source license by its SPDX-derived key
  # (e.g. "mit"). Returns null for an unknown key.
  license(key: String!): License
  # licenses lists the open-source licenses Githome can detect and offer.
  licenses: [License]!
  # codeOfConduct looks up a single code of conduct by its key (e.g.
  # "contributor_covenant"). Returns null for an unknown key.
  codeOfConduct(key: String!): CodeOfConduct
  # codesOfConduct lists the codes of conduct Githome can offer.
  codesOfConduct: [CodeOfConduct]!
  # meta returns information about the running Githome instance, the analogue of
  # GitHub's /meta endpoint.
  meta: GitHubMetadata!
}

# Repository is a git repository.
type Repository implements Node {
  id: ID!
  name: String!
  nameWithOwner: String!
  description: String
  isPrivate: Boolean!
  isFork: Boolean!
  isArchived: Boolean!
  isEmpty: Boolean!
  isInOrganization: Boolean!
  forkCount: Int!
  stargazerCount: Int!
  diskUsage: Int
  homepageUrl: URI
  createdAt: DateTime!
  updatedAt: DateTime!
  pushedAt: DateTime
  url: URI!
  # sshUrl is the git SSH clone address. GitHub types it GitSSHRemote, not URI.
  sshUrl: GitSSHRemote!
  # databaseId is the repository's integer database id, the value the REST API
  # calls id.
  databaseId: Int
  # visibility is the repository's visibility level. gh repo view selects it.
  visibility: RepositoryVisibility!
  # viewerPermission is the viewer's effective permission on the repository.
  viewerPermission: RepositoryPermission
  # viewerCanAdminister is whether the viewer can administer the repository.
  viewerCanAdminister: Boolean!
  # viewerDefaultMergeMethod is the merge method the viewer's UI defaults to.
  viewerDefaultMergeMethod: PullRequestMergeMethod!
  # hasIssuesEnabled is whether the repository accepts issues. gh issue list
  # checks it before listing.
  hasIssuesEnabled: Boolean!
  # hasWikiEnabled is whether the repository has a wiki.
  hasWikiEnabled: Boolean!
  # hasProjectsEnabled is whether the repository has projects.
  hasProjectsEnabled: Boolean!
  # hasDiscussionsEnabled is whether the repository has discussions. Githome
  # does not model discussions, so it is always false.
  hasDiscussionsEnabled: Boolean!
  # isTemplate is whether the repository is a template.
  isTemplate: Boolean!
  # isMirror is whether the repository is a mirror. Githome does not mirror, so
  # it is always false and mirrorUrl is always null.
  isMirror: Boolean!
  mirrorUrl: URI
  # deleteBranchOnMerge is whether head branches are deleted automatically on
  # merge.
  deleteBranchOnMerge: Boolean!
  # autoMergeAllowed is whether auto-merge can be enabled on pull requests in
  # this repository. Githome always returns true.
  autoMergeAllowed: Boolean!
  # mergeCommitAllowed is whether merge commits are allowed in pull requests.
  mergeCommitAllowed: Boolean!
  # squashMergeAllowed is whether squash merges are allowed in pull requests.
  squashMergeAllowed: Boolean!
  # rebaseMergeAllowed is whether rebase merges are allowed in pull requests.
  rebaseMergeAllowed: Boolean!
  # parent is the repository this one was forked from, null for a non-fork.
  # gh repo view and the cross-fork pr create flow select it.
  parent: Repository
  # repositoryTopics is the connection over the repository's topics.
  repositoryTopics(first: Int, after: String): RepositoryTopicConnection!
  # watchers is the connection over the users watching the repository.
  watchers(first: Int, after: String): UserConnection!
  # languages is the connection over the languages detected in the repository,
  # ordered by byte size. Githome does not compute language statistics, so it
  # is always empty.
  languages(first: Int, after: String, orderBy: LanguageOrder): LanguageConnection
  # milestones is the connection over the repository's milestones.
  milestones(
    first: Int
    after: String
    states: [MilestoneState!]
    orderBy: MilestoneOrder
    query: String
  ): MilestoneConnection
  # latestRelease is the repository's most recent published release, null when
  # there are none.
  latestRelease: Release
  # issueTemplates is the set of issue templates configured in the repository.
  issueTemplates: [IssueTemplate!]
  # pullRequestTemplates is the set of pull-request templates configured in the
  # repository.
  pullRequestTemplates: [PullRequestTemplate!]
  # ref looks up a single ref by its qualified name, e.g. "refs/heads/main".
  # Returns null when the ref does not exist.
  ref(qualifiedName: String!): Ref
  defaultBranchRef: Ref
  primaryLanguage: Language
  licenseInfo: License
  owner: RepositoryOwner!
}

# RepositoryPermission is the viewer's access level on a repository.
enum RepositoryPermission {
  ADMIN
  MAINTAIN
  WRITE
  TRIAGE
  READ
}

# RepositoryOwner is the owner of a repository. It is an interface so gh's
# `... on User` and `... on Organization` inline fragments validate; User is
# the only implementer until organizations arrive.
interface RepositoryOwner {
  id: ID!
  login: String!
  url: URI!
  avatarUrl: URI!
  resourcePath: URI!
  # repositories lists the repositories owned by this owner.
  repositories(
    first: Int
    after: String
    ownerAffiliations: [RepositoryAffiliation!]
    isArchived: Boolean
    isFork: Boolean
    privacy: RepositoryPrivacy
    orderBy: RepositoryOrder
  ): RepositoryConnection!
}

# RepositoryAffiliation is the viewer's relationship to a repository.
enum RepositoryAffiliation {
  OWNER
  COLLABORATOR
  ORGANIZATION_MEMBER
}

# RepositoryPrivacy is the visibility of a repository.
enum RepositoryPrivacy {
  PUBLIC
  PRIVATE
}

# RepositoryOrderField is the field to order repositories by.
enum RepositoryOrderField {
  CREATED_AT
  UPDATED_AT
  PUSHED_AT
  NAME
  STARGAZERS
}

# OrderDirection is the direction to order results in.
enum OrderDirection {
  ASC
  DESC
}

# RepositoryOrder specifies how to order repositories.
input RepositoryOrder {
  field: RepositoryOrderField!
  direction: OrderDirection!
}

# RepositoryConnection is the Relay connection over a set of repositories.
type RepositoryConnection {
  nodes: [Repository]
  pageInfo: PageInfo!
  totalCount: Int!
}

# Language is a programming language detected in a repository.
type Language {
  name: String!
}

# License is an open-source license.
type License {
  # key is the lowercase identifier GitHub keys licenses by, e.g. "mit".
  key: String!
  name: String!
  # nickname is a short common name, e.g. "GNU GPLv3", null when there is none.
  nickname: String
  # spdxId is the SPDX short identifier, e.g. "MIT", null when the license has
  # no SPDX id.
  spdxId: String
  # url is the HTML page describing the license, null when none is published.
  url: URI
  # body is the full license text. It is empty for a license summary that
  # carries no stored body.
  body: String!
}

# CodeOfConduct is a code of conduct a repository can adopt.
type CodeOfConduct {
  # key is the lowercase identifier, e.g. "contributor_covenant".
  key: String!
  name: String!
  # body is the full text, empty when only the summary is known.
  body: String
  # url is the HTML page for the code of conduct, null when none is published.
  url: URI
}

# GitHubMetadata describes the running instance, the analogue of /meta. A
# self-hosted Githome does not publish GitHub's hosted-service IP ranges, so the
# address lists come back empty.
type GitHubMetadata {
  # gitHubServicesSha is the running build's commit SHA, empty when unknown.
  gitHubServicesSha: GitObjectID!
  # isPasswordAuthenticationVerifiable mirrors GitHub's flag; Githome accepts
  # password auth, so it is true.
  isPasswordAuthenticationVerifiable: Boolean!
  gitIpAddresses: [String!]
  hookIpAddresses: [String!]
  importerIpAddresses: [String!]
  pagesIpAddresses: [String!]
}

# User is a GitHub user account.
type User implements Node & Actor & RepositoryOwner {
  id: ID!
  login: String!
  name: String
  email: String
  bio: String
  # databaseId is the user's integer database id, the value the REST API calls id.
  databaseId: Int
  # company is the user's profile company string, null when unset.
  company: String
  # location is the user's profile location string, null when unset.
  location: String
  # websiteUrl is the user's profile blog/website URL, null when unset.
  websiteUrl: URI
  # twitterUsername is the user's Twitter/X handle without the leading @, null
  # when unset.
  twitterUsername: String
  url: URI!
  # avatarUrl is the user's avatar. The optional size argument requests a
  # square image that many pixels on a side, the same `?s=` query gh appends.
  avatarUrl(size: Int): URI!
  resourcePath: URI!
  # isViewer is whether this user is the actor making the request.
  isViewer: Boolean!
  # status is the user's set status. Githome does not model user statuses, so
  # this is always null.
  status: UserStatus
  createdAt: DateTime!
  updatedAt: DateTime!
  # repositories lists the repositories owned by this user.
  repositories(
    first: Int
    after: String
    ownerAffiliations: [RepositoryAffiliation!]
    isArchived: Boolean
    isFork: Boolean
    privacy: RepositoryPrivacy
    orderBy: RepositoryOrder
  ): RepositoryConnection!
}

# UserStatus is a user's set status (the emoji and message shown on a profile).
# Githome does not model statuses yet; the type exists so gh's `status { ... }`
# selection validates and resolves to null.
type UserStatus implements Node {
  id: ID!
  emoji: String
  message: String
  # indicatesLimitedAvailability is whether the user has marked themselves busy.
  indicatesLimitedAvailability: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  expiresAt: DateTime
}


# Ref is a git reference: a branch or a tag. The id field carries the opaque
# node ID clients pass to deleteRef.
type Ref implements Node {
  id: ID!
  name: String!
  target: GitObject
  prefix: String!
}

# GitObject is a git object addressed by its SHA: the interface Commit, Tree,
# Blob, and Tag implement, so Ref.target narrows with inline fragments.
interface GitObject {
  id: ID!
  oid: GitObjectID!
  abbreviatedOid: String!
}

# Tree is a git tree object.
type Tree implements GitObject & Node {
  id: ID!
  oid: GitObjectID!
  abbreviatedOid: String!
}

# Blob is a git blob object.
type Blob implements GitObject & Node {
  id: ID!
  oid: GitObjectID!
  abbreviatedOid: String!
}

# Tag is an annotated git tag object.
type Tag implements GitObject & Node {
  id: ID!
  oid: GitObjectID!
  abbreviatedOid: String!
  name: String!
  target: GitObject
}

# RateLimit is the current rate-limit state for the viewer.
type RateLimit {
  limit: Int!
  cost: Int!
  remaining: Int!
  resetAt: DateTime!
  nodeCount: Int!
  used: Int!
}

# SearchType is the category of object to search.
enum SearchType {
  ISSUE
  REPOSITORY
  USER
  DISCUSSION
}

# SearchResultItem is a single result in a search.
union SearchResultItem = Repository | Issue | PullRequest | User

# SearchResultItemConnection is the Relay connection over search results.
type SearchResultItemConnection {
  nodes: [SearchResultItem]
  # edges pairs each result with its cursor; gh pr status reads search results
  # through edges { node }.
  edges: [SearchResultItemEdge]
  pageInfo: PageInfo!
  issueCount: Int!
  repositoryCount: Int!
  userCount: Int!
  wikiCount: Int!
  # codeCount is the number of code results; Githome does not index code
  # search, so it is always 0.
  codeCount: Int!
  # discussionCount is the number of discussion results; Githome does not model
  # discussions, so it is always 0.
  discussionCount: Int!
}

# SearchResultItemEdge is one search result with its cursor.
type SearchResultItemEdge {
  cursor: String!
  node: SearchResultItem
}

# RepositoryVisibility is a repository's visibility level.
enum RepositoryVisibility {
  PUBLIC
  PRIVATE
  INTERNAL
}

# Topic is a repository topic.
type Topic implements Node {
  id: ID!
  name: String!
}

# RepositoryTopic pairs a topic with the repository it is applied to.
type RepositoryTopic implements Node {
  id: ID!
  topic: Topic!
  url: URI!
}

# RepositoryTopicConnection is the connection over a repository's topics.
type RepositoryTopicConnection {
  nodes: [RepositoryTopic]
  pageInfo: PageInfo!
  totalCount: Int!
}

# LanguageOrderField is the field to order languages by.
enum LanguageOrderField {
  SIZE
}

# LanguageOrder specifies how to order languages.
input LanguageOrder {
  field: LanguageOrderField!
  direction: OrderDirection!
}

# LanguageConnection is the connection over the languages in a repository.
type LanguageConnection {
  edges: [LanguageEdge]
  nodes: [Language]
  pageInfo: PageInfo!
  totalCount: Int!
  totalSize: Int!
}

# LanguageEdge pairs a language with the number of bytes written in it.
type LanguageEdge {
  cursor: String!
  node: Language!
  size: Int!
}

# MilestoneState is whether a milestone is open or closed.
enum MilestoneState {
  OPEN
  CLOSED
}

# MilestoneOrderField is the field to order milestones by.
enum MilestoneOrderField {
  DUE_DATE
  CREATED_AT
  UPDATED_AT
  NUMBER
}

# MilestoneOrder specifies how to order milestones.
input MilestoneOrder {
  field: MilestoneOrderField!
  direction: OrderDirection!
}

# MilestoneConnection is the connection over a repository's milestones.
type MilestoneConnection {
  nodes: [Milestone]
  pageInfo: PageInfo!
  totalCount: Int!
}

# Release is a published release of a repository.
type Release implements Node {
  id: ID!
  name: String
  tagName: String!
  url: URI!
  createdAt: DateTime!
  publishedAt: DateTime
  isLatest: Boolean!
  isPrerelease: Boolean!
  isDraft: Boolean!
}

# IssueTemplate is an issue template configured in a repository.
type IssueTemplate {
  name: String!
  title: String
  body: String
  about: String
}

# PullRequestTemplate is a pull-request template configured in a repository.
type PullRequestTemplate {
  filename: String
  body: String
}
