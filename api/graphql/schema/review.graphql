# The code review slice of the GraphQL schema. It adds the review fields gh pr
# view and gh pr status select onto PullRequest and its head Commit: the derived
# review decision, the review threads, and the status check rollup. The two thread
# mutations resolve and unresolve a conversation. Object types bind to the
# hand-written structs in presenter/gqlmodel; the enums bind to the typed string
# constants there.

extend type PullRequest {
  # reviewDecision is the pull request's derived review state, null when no
  # submitted review blocks or approves it. Githome computes APPROVED and
  # CHANGES_REQUESTED from the reviews; REVIEW_REQUIRED needs branch protection.
  reviewDecision: PullRequestReviewDecision
  # reviewThreads is the connection over the pull request's review conversations,
  # each a root comment and its replies.
  reviewThreads(first: Int, after: String): PullRequestReviewThreadConnection!
}

extend type Commit {
  # statusCheckRollup folds every status and check run on the commit into one
  # state, null when none have been reported against it.
  statusCheckRollup: StatusCheckRollup
}

# PullRequestReviewDecision is a pull request's derived review state.
enum PullRequestReviewDecision {
  CHANGES_REQUESTED
  APPROVED
  REVIEW_REQUIRED
}

# StatusState is a rollup or status state, worst first.
enum StatusState {
  ERROR
  EXPECTED
  FAILURE
  PENDING
  SUCCESS
}

# PullRequestReviewThread is a review conversation: a root comment and its replies.
type PullRequestReviewThread {
  id: ID!
  isResolved: Boolean!
  isOutdated: Boolean!
  path: String!
  line: Int
  # comments is the connection over the thread's comments, oldest first.
  comments(first: Int, after: String): PullRequestReviewCommentConnection!
}

type PullRequestReviewThreadConnection {
  nodes: [PullRequestReviewThread]
  totalCount: Int!
}

# PullRequestReviewComment is one inline comment in a review thread.
type PullRequestReviewComment {
  id: ID!
  body: String!
  path: String!
  author: Actor
  outdated: Boolean!
  url: URI!
  createdAt: DateTime!
}

type PullRequestReviewCommentConnection {
  nodes: [PullRequestReviewComment]
  totalCount: Int!
}

# StatusCheckRollup is a head commit's combined status and check state.
type StatusCheckRollup {
  state: StatusState!
  # contexts lists each individual status or check run that contributes to the
  # rollup state.
  contexts(first: Int): StatusCheckRollupContextConnection!
}

# StatusCheckRollupContextConnection is the connection over check/status contexts.
type StatusCheckRollupContextConnection {
  nodes: [StatusCheckRollupContext]
  totalCount: Int!
}

# StatusCheckRollupContext is one check run or commit status contributing to the
# rollup, returned as a union gh pr checks reads with __typename.
union StatusCheckRollupContext = CheckRun | StatusContext

# CheckRun is one named check run against a head sha.
type CheckRun implements Node {
  id: ID!
  name: String!
  status: CheckStatusState!
  conclusion: CheckConclusionState
  startedAt: DateTime
  completedAt: DateTime
  url: URI!
  detailsUrl: URI
}

# CheckStatusState is the status of a check run.
enum CheckStatusState {
  QUEUED
  IN_PROGRESS
  COMPLETED
  WAITING
  PENDING
  REQUESTED
}

# CheckConclusionState is the conclusion of a completed check run.
enum CheckConclusionState {
  ACTION_REQUIRED
  TIMED_OUT
  CANCELLED
  FAILURE
  SUCCESS
  NEUTRAL
  SKIPPED
  STARTUP_FAILURE
  STALE
}

# StatusContext is a commit status contributing to the rollup.
type StatusContext {
  context: String!
  state: StatusState!
  targetUrl: URI
  description: String
}

# PullRequestReviewEvent is the action a submitted review carries.
enum PullRequestReviewEvent {
  APPROVE
  COMMENT
  REQUEST_CHANGES
  DISMISS
}

# DiffSide is the side of a diff a review comment anchors to.
enum DiffSide {
  LEFT
  RIGHT
}

extend type Mutation {
  # resolveReviewThread marks a review conversation resolved.
  resolveReviewThread(input: ResolveReviewThreadInput!): ResolveReviewThreadPayload
  # unresolveReviewThread reopens a resolved review conversation.
  unresolveReviewThread(input: UnresolveReviewThreadInput!): UnresolveReviewThreadPayload
  # addPullRequestReview adds a review to a pull request.
  addPullRequestReview(input: AddPullRequestReviewInput!): AddPullRequestReviewPayload
  # submitPullRequestReview submits a pending draft review.
  submitPullRequestReview(input: SubmitPullRequestReviewInput!): SubmitPullRequestReviewPayload
  # deletePullRequestReview deletes a pending draft review.
  deletePullRequestReview(input: DeletePullRequestReviewInput!): DeletePullRequestReviewPayload
  # addPullRequestReviewComment adds an inline review comment to a pull request.
  addPullRequestReviewComment(input: AddPullRequestReviewCommentInput!): AddPullRequestReviewCommentPayload
}

input ResolveReviewThreadInput {
  threadId: ID!
  clientMutationId: String
}

type ResolveReviewThreadPayload {
  thread: PullRequestReviewThread
  clientMutationId: String
}

input UnresolveReviewThreadInput {
  threadId: ID!
  clientMutationId: String
}

type UnresolveReviewThreadPayload {
  thread: PullRequestReviewThread
  clientMutationId: String
}

# PullRequestReview is a submitted review on a pull request. It is the return
# type for addPullRequestReview and submitPullRequestReview.
type PullRequestReview {
  id: ID!
  state: PullRequestReviewState!
  body: String!
  author: Actor
  submittedAt: DateTime
  url: URI!
}

# PullRequestReviewState is a submitted review's state.
enum PullRequestReviewState {
  PENDING
  COMMENTED
  APPROVED
  CHANGES_REQUESTED
  DISMISSED
}

input DraftPullRequestReviewComment {
  path: String!
  position: Int
  body: String!
  line: Int
  side: DiffSide
  startLine: Int
  startSide: DiffSide
}

input AddPullRequestReviewInput {
  pullRequestId: ID!
  commitOID: GitObjectID
  body: String
  event: PullRequestReviewEvent
  comments: [DraftPullRequestReviewComment]
  clientMutationId: String
}

type AddPullRequestReviewPayload {
  pullRequestReview: PullRequestReview
  reviewEdge: PullRequestReviewEdge
  clientMutationId: String
}

type PullRequestReviewEdge {
  cursor: String!
  node: PullRequestReview
}

input SubmitPullRequestReviewInput {
  pullRequestReviewId: ID!
  event: PullRequestReviewEvent!
  body: String
  clientMutationId: String
}

type SubmitPullRequestReviewPayload {
  pullRequestReview: PullRequestReview
  clientMutationId: String
}
input DeletePullRequestReviewInput {
  pullRequestReviewId: ID!
  clientMutationId: String
}

type DeletePullRequestReviewPayload {
  pullRequestReview: PullRequestReview
  clientMutationId: String
}

input AddPullRequestReviewCommentInput {
  pullRequestId: ID
  pullRequestReviewId: ID
  commitOID: GitObjectID
  body: String!
  path: String
  position: Int
  line: Int
  side: DiffSide
  startLine: Int
  startSide: DiffSide
  inReplyTo: ID
  clientMutationId: String
}

type AddPullRequestReviewCommentPayload {
  comment: PullRequestReviewComment
  commentEdge: PullRequestReviewCommentEdge
  clientMutationId: String
}

type PullRequestReviewCommentEdge {
  cursor: String!
  node: PullRequestReviewComment
}
