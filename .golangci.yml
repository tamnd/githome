version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - depguard
    - misspell
    - revive
    - unconvert
    - whitespace
  settings:
    depguard:
      rules:
        no-internal:
          deny:
            - pkg: github.com/tamnd/githome/internal
              desc: internal/ directories are forbidden in this project; use the domain layer and lint for boundaries
    misspell:
      locale: US
      # cancelled is a GitHub check-run conclusion value (their spelling, not ours).
      ignore-rules:
        - cancelled
  exclusions:
    rules:
      # gqlgen owns the resolver method signatures: their argument names come
      # from the schema field arguments, so a resolver that does not use one
      # (ctx, after, dryRun, ...) cannot rename it without the next regenerate
      # reverting the change. Do not flag unused parameters in generated
      # resolver files.
      - path: \.resolvers\.go$
        linters:
          - revive
        text: unused-parameter

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tamnd/githome
