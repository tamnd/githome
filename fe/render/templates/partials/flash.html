{{define "flash" -}}
{{/* The data here is a slice of Flash {Kind, Message}. Kind is one of success,
     error, info; it maps to a CSS modifier. Flash messages are server-set and
     shown once, so this renders nothing when the slice is empty. */ -}}
{{range . -}}
<div class="flash flash-{{.Kind}}" role="status">{{.Message}}</div>
{{end -}}
{{- end}}
