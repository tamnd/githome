name: build

# Cross-platform build matrix. Compiles every githome binary (server, migrate,
# conform) for every OS/arch the dependency stack supports, packages each as a
# release archive with checksums, and runs a native smoke test on every target
# that has a GitHub-hosted runner so we prove the binaries actually start, not
# just that they link.
#
# The supported set is bounded by modernc.org/sqlite (the pure-Go SQLite driver):
# it ships translated sources for the targets below and CGO stays disabled so the
# binaries are static and cross-compile cleanly. Targets it does not support
# (netbsd, illumos, solaris, dragonfly, linux/mips*, the 32-bit BSDs) are
# intentionally absent; adding them would need a cgo SQLite driver and break the
# static, cross-compiled build.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: v
        name: resolve build version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            v="${GITHUB_REF_NAME}"
          else
            v="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "resolved build version: $v"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: arm }
          - { goos: linux, goarch: "386" }
          - { goos: linux, goarch: ppc64le }
          - { goos: linux, goarch: s390x }
          - { goos: linux, goarch: riscv64 }
          - { goos: linux, goarch: loong64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: windows, goarch: "386" }
          - { goos: freebsd, goarch: amd64 }
          - { goos: freebsd, goarch: arm64 }
          - { goos: openbsd, goarch: amd64 }
          - { goos: openbsd, goarch: arm64 }
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build binaries
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          name="githome_${VERSION}_${GOOS}_${GOARCH}"
          dist="dist/${name}"
          mkdir -p "$dist"
          ldflags="-s -w -X github.com/tamnd/githome/config.Version=${VERSION}"
          for cmd in githome githome-migrate githome-conform; do
            echo "building $cmd"
            go build -trimpath -ldflags "$ldflags" -o "${dist}/${cmd}${ext}" "./cmd/${cmd}"
          done
          cp LICENSE README.md "$dist/"
          echo "DIST=$dist" >> "$GITHUB_ENV"
          echo "ARTIFACT=$name" >> "$GITHUB_ENV"

      - name: verify binary format matches target
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          bin="${DIST}/githome${ext}"
          info="$(file -b "$bin")"
          echo "$bin: $info"
          case "$GOOS" in
            linux|freebsd|openbsd) echo "$info" | grep -q "ELF" || { echo "expected ELF for $GOOS"; exit 1; } ;;
            darwin) echo "$info" | grep -q "Mach-O" || { echo "expected Mach-O for darwin"; exit 1; } ;;
            windows) echo "$info" | grep -q "PE32" || { echo "expected PE32 for windows"; exit 1; } ;;
          esac
          test -s "$bin"

      - name: package archive and checksum
        env:
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip -r "${ARTIFACT}.zip" "$ARTIFACT" >/dev/null
            sha256sum "${ARTIFACT}.zip" > "${ARTIFACT}.zip.sha256"
          else
            tar -czf "${ARTIFACT}.tar.gz" "$ARTIFACT"
            sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          fi
          ls -l

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  smoke:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, goos: linux, goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { runner: macos-13, goos: darwin, goarch: amd64 }
          - { runner: macos-15, goos: darwin, goarch: arm64 }
          - { runner: windows-2025, goos: windows, goarch: amd64 }
          - { runner: windows-11-arm, goos: windows, goarch: arm64 }
    name: smoke ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build for host and run it
        shell: bash
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          ldflags="-X github.com/tamnd/githome/config.Version=${VERSION}"
          go build -trimpath -ldflags "$ldflags" -o "githome${ext}" ./cmd/githome
          go build -trimpath -ldflags "$ldflags" -o "githome-migrate${ext}" ./cmd/githome-migrate
          go build -trimpath -ldflags "$ldflags" -o "githome-conform${ext}" ./cmd/githome-conform

          got="$(./githome${ext} -version)"
          echo "githome -version => '$got' (want '$VERSION')"
          [ "$got" = "$VERSION" ] || { echo "::error::version flag returned '$got', expected '$VERSION'"; exit 1; }

          # The migrate tool prints its usage and exits non-zero with no args;
          # we only assert it starts and produces the expected usage line.
          usage="$(./githome-migrate${ext} 2>&1 || true)"
          echo "githome-migrate (no args) => $usage"
          echo "$usage" | grep -q "usage: githome-migrate" || { echo "::error::migrate did not print usage"; exit 1; }

  build-complete:
    name: build-complete
    if: always()
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - name: gate on all builds and smoke tests
        run: |
          echo "build:  ${{ needs.build.result }}"
          echo "smoke:  ${{ needs.smoke.result }}"
          if [ "${{ needs.build.result }}" != "success" ] || [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "::error::one or more cross-platform build or smoke jobs failed"
            exit 1
          fi
          echo "all targets compiled and every runner-backed target ran natively"
